<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 项目看板</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            background: white;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .header h1 {
            font-size: 22px;
            color: #262626;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .controls-left {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 1;
        }

        .search-box {
            width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1890ff;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 16px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .filter-btn.active {
            background: #1890ff;
            border-color: #1890ff;
            color: white;
        }

        .btn-primary {
            padding: 8px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-primary:disabled {
            background: #bfbfbf;
            cursor: not-allowed;
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-card.total .number { color: #1890ff; }
        .stat-card.planning .number { color: #faad14; }
        .stat-card.developing .number { color: #fa8c16; }
        .stat-card.testing .number { color: #722ed1; }
        .stat-card.online .number { color: #52c41a; }

        .stat-card .label {
            color: #8c8c8c;
            font-size: 14px;
        }

        /* 表格容器 */
        .table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            max-width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }

        th {
            background: #fafafa;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            color: #262626;
            border-bottom: 1px solid #f0f0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:hover {
            background: #fafafa;
        }

        /* 列宽设置 */
        th:nth-child(1), td:nth-child(1) { width: 100px; }
        th:nth-child(2), td:nth-child(2) { width: 90px; }
        th:nth-child(3), td:nth-child(3) { width: 90px; }
        th:nth-child(4), td:nth-child(4) { width: 160px; }
        th:nth-child(5), td:nth-child(5) { width: 180px; }
        th:nth-child(6), td:nth-child(6) { width: 70px; }
        th:nth-child(7), td:nth-child(7) { width: 70px; }
        th:nth-child(8), td:nth-child(8) { width: 120px; }
        th:nth-child(9), td:nth-child(9) { width: 90px; }
        th:nth-child(10), td:nth-child(10) { width: 90px; }
        th:nth-child(11), td:nth-child(11) { width: 60px; text-align: center; }
        th:nth-child(12), td:nth-child(12) { width: 70px; text-align: center; }
        th:nth-child(13), td:nth-child(13) { width: 140px; }
        th:nth-child(14), td:nth-child(14) { width: 70px; text-align: center; }
        th:nth-child(15), td:nth-child(15) { width: 70px; text-align: center; }
        th:nth-child(16), td:nth-child(16) { width: 100px; text-align: center; }

        /* 优先级标签 */
        .priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .priority.p0 { background: #ff4d4f; color: white; }
        .priority.p1 { background: #faad14; color: white; }
        .priority.p2 { background: #52c41a; color: white; }
        .priority.p3 { background: #d9d9d9; color: #666; }

        /* 状态标签 */
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }

        .status.planning { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
        .status.developing { background: #fff2e8; color: #ad6800; border: 1px solid #ffbb96; }
        .status.testing { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
        .status.online { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-edit, .btn-delete {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #1890ff;
            color: white;
        }

        .btn-edit:hover {
            background: #40a9ff;
        }

        .btn-delete {
            background: #ff4d4f;
            color: white;
        }

        .btn-delete:hover {
            background: #ff7875;
        }

        /* 链接 */
        .url-link {
            color: #1890ff;
            text-decoration: none;
            font-size: 12px;
        }

        .url-link:hover {
            text-decoration: underline;
        }

        .no-url {
            color: #bfbfbf;
            font-size: 12px;
        }

        /* 版本号 */
        .version {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #595959;
        }

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            color: #262626;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8c8c8c;
            line-height: 1;
        }

        .modal-close:hover {
            color: #262626;
        }

        .modal-body {
            padding: 24px;
        }

        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item.full-width {
            grid-column: 1 / -1;
        }

        .form-item label {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
        }

        .form-item label .required {
            color: #ff4d4f;
            margin-left: 4px;
        }

        .form-item input,
        .form-item select,
        .form-item textarea {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #1890ff;
        }

        .form-item textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-cancel {
            padding: 8px 20px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-cancel:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .btn-save {
            padding: 8px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-save:hover {
            background: #40a9ff;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #8c8c8c;
        }

        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .table-scroll {
                overflow-x: auto;
            }
        }

        @media (max-width: 1200px) {
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls-left {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .filter-buttons {
                flex-wrap: wrap;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📋 IT 项目看板</h1>
            <div class="controls">
                <div class="controls-left">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索项目、模块、负责人..." oninput="filterProjects()">
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                        <button class="filter-btn" onclick="setFilter('规划中')">规划中</button>
                        <button class="filter-btn" onclick="setFilter('开发中')">开发中</button>
                        <button class="filter-btn" onclick="setFilter('测试中')">测试中</button>
                        <button class="filter-btn" onclick="setFilter('已上线')">已上线</button>
                    </div>
                </div>
                <button class="btn-primary" id="addBtn" onclick="openAddModal()">+ 新增项目</button>
            </div>
        </div>

        <!-- 统计 -->
        <div class="stats">
            <div class="stat-card total">
                <div class="number" id="totalCount">0</div>
                <div class="label">总项目</div>
            </div>
            <div class="stat-card planning">
                <div class="number" id="planningCount">0</div>
                <div class="label">规划中</div>
            </div>
            <div class="stat-card developing">
                <div class="number" id="developingCount">0</div>
                <div class="label">开发中</div>
            </div>
            <div class="stat-card testing">
                <div class="number" id="testingCount">0</div>
                <div class="label">测试中</div>
            </div>
            <div class="stat-card online">
                <div class="number" id="onlineCount">0</div>
                <div class="label">已上线</div>
            </div>
        </div>

        <!-- 项目表格 -->
        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>主系统</th>
                            <th>模块</th>
                            <th>子系统</th>
                            <th>项目简介</th>
                            <th>主要功能</th>
                            <th>需求方</th>
                            <th>负责人</th>
                            <th>开发参与人</th>
                            <th>预计完成</th>
                            <th>预计测试</th>
                            <th>优先级</th>
                            <th>状态</th>
                            <th>目前进度</th>
                            <th>网址</th>
                            <th>版本号</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="projectTable">
                        <tr><td colspan="16" class="loading">正在连接数据库...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">新增项目</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="errorContainer"></div>
                <form id="projectForm" onsubmit="saveProject(event)">
                    <div class="form-grid">
                        <div class="form-item">
                            <label>主系统 <span class="required">*</span></label>
                            <input type="text" name="主系统" required placeholder="如：工厂评估系统">
                        </div>
                        <div class="form-item">
                            <label>模块 <span class="required">*</span></label>
                            <input type="text" name="模块" required placeholder="如：供应商管理">
                        </div>
                        <div class="form-item">
                            <label>子系统 <span class="required">*</span></label>
                            <input type="text" name="子系统" required placeholder="如：准入评估">
                        </div>
                        <div class="form-item">
                            <label>需求方 <span class="required">*</span></label>
                            <input type="text" name="需求方" required placeholder="如：采购部">
                        </div>
                        <div class="form-item">
                            <label>负责人 <span class="required">*</span></label>
                            <input type="text" name="负责人" required placeholder="如：张三">
                        </div>
                        <div class="form-item">
                            <label>优先级 <span class="required">*</span></label>
                            <select name="优先级" required>
                                <option value="P0">P0 - 紧急</option>
                                <option value="P1">P1 - 高</option>
                                <option value="P2" selected>P2 - 中</option>
                                <option value="P3">P3 - 低</option>
                            </select>
                        </div>
                        <div class="form-item">
                            <label>项目状态 <span class="required">*</span></label>
                            <select name="项目状态" required>
                                <option value="规划中">规划中</option>
                                <option value="开发中" selected>开发中</option>
                                <option value="测试中">测试中</option>
                                <option value="已上线">已上线</option>
                            </select>
                        </div>
                        <div class="form-item">
                            <label>版本号</label>
                            <input type="text" name="版本号" placeholder="如：V1.0.0">
                        </div>
                        <div class="form-item">
                            <label>预计完成时间</label>
                            <input type="text" name="预计完成时间" placeholder="如：2024-08-30">
                        </div>
                        <div class="form-item">
                            <label>预计第一版测试时间</label>
                            <input type="text" name="预计第一版测试时间" placeholder="如：2024-07-15">
                        </div>
                        <div class="form-item full-width">
                            <label>开发参与人/分工</label>
                            <input type="text" name="开发参与人" placeholder="如：张三(前端)+李四(后端)">
                        </div>
                        <div class="form-item full-width">
                            <label>网址</label>
                            <input type="text" name="网址" placeholder="如：http://example.com 或 未上线">
                        </div>
                        <div class="form-item full-width">
                            <label>项目简介</label>
                            <textarea name="项目简介" placeholder="一句话描述项目价值"></textarea>
                        </div>
                        <div class="form-item full-width">
                            <label>主要功能</label>
                            <textarea name="主要功能" placeholder="描述主要功能点"></textarea>
                        </div>
                        <div class="form-item full-width">
                            <label>目前进度</label>
                            <textarea name="目前进度" placeholder="描述当前进展"></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                        <button type="submit" class="btn-save" id="saveBtn">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    
    <script>
        // Supabase 配置 - 从外部配置文件加载
        // 请将 config.js 放在同目录下，该文件不会被上传到 GitHub
        let SUPABASE_URL, SUPABASE_ANON_KEY;
        
        // 尝试从外部配置文件读取
        if (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) {
            SUPABASE_URL = CONFIG.SUPABASE_URL;
            SUPABASE_ANON_KEY = CONFIG.SUPABASE_ANON_KEY;
        } else {
            // 如果配置文件不存在，显示错误
            document.getElementById('projectTable').innerHTML = 
                `<tr><td colspan="16" style="text-align: center; padding: 40px; color: #ff4d4f;">
                    <h3>配置缺失</h3>
                    <p>请在网站目录下创建 config.js 文件，包含：</p>
                    <pre style="text-align: left; background: #f5f5f5; padding: 10px; margin: 10px auto; max-width: 500px;">
const CONFIG = {
    SUPABASE_URL: '你的URL',
    SUPABASE_ANON_KEY: '你的KEY'
};</pre>
                    <p><small>config.js 不会被上传到 GitHub（已添加到 .gitignore）</small></p>
                </td></tr>`;
            throw new Error('Supabase 配置缺失，请创建 config.js 文件');
        }
        
        // 初始化 Supabase 客户端
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 创建全局引用，方便函数使用
        window.supabase = supabaseClient;
        
        let allProjects = [];
        let currentFilter = 'all';
        let editingId = null;

        // 加载数据
        async function loadData() {
            try {
                const { data, error } = await supabase
                    .from('projects')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) throw error;
                
                allProjects = data || [];
                renderProjects();
                updateStats();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('projectTable').innerHTML = 
                    `<tr><td colspan="16" class="loading" style="color: #ff4d4f;">
                        连接数据库失败，请检查 Supabase 配置<br>
                        <small>${escapeHtml(error.message)}</small>
                    </td></tr>`;
            }
        }

        // 渲染项目表格
        function renderProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('projectTable');
            tbody.innerHTML = '';

            allProjects.forEach((project) => {
                // 筛选
                if (currentFilter !== 'all' && project['项目状态'] !== currentFilter) {
                    return;
                }

                // 搜索
                const searchContent = [
                    project['主系统'],
                    project['模块'],
                    project['子系统'],
                    project['负责人'],
                    project['需求方']
                ].join(' ').toLowerCase();
                
                if (searchTerm && !searchContent.includes(searchTerm)) {
                    return;
                }

                const row = createProjectRow(project);
                tbody.appendChild(row);
            });

            if (tbody.children.length === 0) {
                tbody.innerHTML = '<tr><td colspan="16" style="text-align: center; padding: 40px; color: #999;">暂无匹配的项目</td></tr>';
            }
        }

        // 创建项目行
        function createProjectRow(project) {
            const row = document.createElement('tr');
            
            const statusClass = getStatusClass(project['项目状态']);
            const priorityClass = getPriorityClass(project['优先级']);
            const hasUrl = project['网址'] && project['网址'] !== '未上线' && project['网址'].startsWith('http');

            row.innerHTML = `
                <td><strong>${escapeHtml(project['主系统'])}</strong></td>
                <td>${escapeHtml(project['模块'])}</td>
                <td>${escapeHtml(project['子系统'])}</td>
                <td title="${escapeHtml(project['项目简介'] || '-')}">${escapeHtml(truncate(project['项目简介'], 20))}</td>
                <td title="${escapeHtml(project['主要功能'] || '-')}">${escapeHtml(truncate(project['主要功能'], 25))}</td>
                <td>${escapeHtml(project['需求方'])}</td>
                <td>${escapeHtml(project['负责人'])}</td>
                <td title="${escapeHtml(project['开发参与人'] || '-')}">${escapeHtml(truncate(project['开发参与人'], 15))}</td>
                <td>${escapeHtml(project['预计完成时间'] || '-')}</td>
                <td>${escapeHtml(project['预计第一版测试时间'] || '-')}</td>
                <td><span class="priority ${priorityClass}">${project['优先级']}</span></td>
                <td><span class="status ${statusClass}">${project['项目状态']}</span></td>
                <td title="${escapeHtml(project['目前进度'] || '-')}">${escapeHtml(truncate(project['目前进度'], 20))}</td>
                <td>${hasUrl 
                    ? `<a href="${escapeHtml(project['网址'])}" target="_blank" class="url-link">🔗 访问</a>` 
                    : '<span class="no-url">未上线</span>'}</td>
                <td><span class="version">${escapeHtml(project['版本号'] || '-')}</span></td>
                <td>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="openEditModal(${project.id})">编辑</button>
                        <button class="btn-delete" onclick="deleteProject(${project.id})">删除</button>
                    </div>
                </td>
            `;

            return row;
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 截断文本
        function truncate(text, maxLength) {
            if (!text) return '-';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const map = {
                '规划中': 'planning',
                '开发中': 'developing',
                '测试中': 'testing',
                '已上线': 'online'
            };
            return map[status] || 'planning';
        }

        // 获取优先级样式类
        function getPriorityClass(priority) {
            const map = {
                'P0': 'p0',
                'P1': 'p1',
                'P2': 'p2',
                'P3': 'p3'
            };
            return map[priority] || 'p2';
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allProjects.length;
            document.getElementById('planningCount').textContent = allProjects.filter(p => p['项目状态'] === '规划中').length;
            document.getElementById('developingCount').textContent = allProjects.filter(p => p['项目状态'] === '开发中').length;
            document.getElementById('testingCount').textContent = allProjects.filter(p => p['项目状态'] === '测试中').length;
            document.getElementById('onlineCount').textContent = allProjects.filter(p => p['项目状态'] === '已上线').length;
        }

        // 设置筛选
        function setFilter(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderProjects();
        }

        // 筛选项目
        function filterProjects() {
            renderProjects();
        }

        // 打开新增弹窗
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增项目';
            document.getElementById('projectForm').reset();
            document.getElementById('errorContainer').innerHTML = '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        // 打开编辑弹窗
        function openEditModal(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('errorContainer').innerHTML = '';
            
            // 填充表单
            const form = document.getElementById('projectForm');
            Object.keys(project).forEach(key => {
                const input = form.querySelector(`[name="${key}"]`);
                if (input) {
                    input.value = project[key] || '';
                }
            });
            
            document.getElementById('modalOverlay').classList.add('active');
        }

        // 显示错误信息
        function showError(message) {
            document.getElementById('errorContainer').innerHTML = 
                `<div class="error-message">${escapeHtml(message)}</div>`;
        }

        // 保存项目
        async function saveProject(event) {
            event.preventDefault();
            
            const form = document.getElementById('projectForm');
            const formData = new FormData(form);
            const project = {};
            
            formData.forEach((value, key) => {
                project[key] = value.trim();
            });

            // 设置默认值
            if (!project['网址']) project['网址'] = '未上线';
            if (!project['版本号']) project['版本号'] = 'V0.1.0';
            if (!project['预计完成时间']) project['预计完成时间'] = '-';
            if (!project['预计第一版测试时间']) project['预计第一版测试时间'] = '-';
            if (!project['开发参与人']) project['开发参与人'] = '-';
            if (!project['项目简介']) project['项目简介'] = '-';
            if (!project['主要功能']) project['主要功能'] = '-';
            if (!project['目前进度']) project['目前进度'] = '-';

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            try {
                if (editingId) {
                    // 编辑
                    const { error } = await supabase
                        .from('projects')
                        .update(project)
                        .eq('id', editingId);
                    
                    if (error) throw error;
                } else {
                    // 新增
                    const { error } = await supabase
                        .from('projects')
                        .insert([project]);
                    
                    if (error) throw error;
                }

                await loadData();
                closeModal();
            } catch (error) {
                console.error('保存失败:', error);
                showError('保存失败: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存';
            }
        }

        // 删除项目
        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;

            try {
                const { error } = await supabase
                    .from('projects')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                
                await loadData();
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败: ' + error.message);
            }
        }

        // 关闭弹窗
        function closeModal(event) {
            if (!event || event.target.id === 'modalOverlay' || event.target.tagName === 'BUTTON') {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
